<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APM Trade - Precision Financial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --bg-deep: #020617;
            --card-glass: rgba(15, 23, 42, 0.6);
            --border-glass: rgba(255, 255, 255, 0.08);
            --primary-gradient: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-deep); color: #f1f5f9; scroll-behavior: smooth; }
        .premium-card { background: var(--card-glass); backdrop-filter: blur(16px); border: 1px solid var(--border-glass); transition: all 0.3s ease; }
        .balance-gradient { background: var(--primary-gradient); box-shadow: 0 20px 40px -15px rgba(79, 70, 229, 0.4); }
        .input-premium { background: rgba(2, 6, 23, 0.8) !important; border: 1px solid var(--border-glass) !important; color: white; }
        .animate-fade { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Animasi halusnya */
        #historyWrapper { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); max-height: 0; overflow: hidden; opacity: 0; }
        #historyWrapper.show { max-height: 2000px; opacity: 1; margin-top: 1.5rem; }
        .rotate-icon { transition: transform 0.3s ease; }
        .rotate-icon.active { transform: rotate(180deg); }

        @media print { .no-print { display: none !important; } body { background: white; color: black; } }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div class="no-print">
        <nav class="sticky top-0 z-50 w-full border-b border-white/5 bg-slate-950/60 backdrop-blur-xl">
            <div class="max-w-5xl mx-auto px-6 h-20 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 balance-gradient rounded-xl flex items-center justify-center text-white"><i data-lucide="crown"></i></div>
                    <span class="text-lg font-extrabold tracking-tight uppercase">NDI Money</span>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="togglePrivacy()" class="p-2 bg-white/5 rounded-full hover:bg-white/10 transition">
                        <i id="privacyIcon" data-lucide="eye" class="w-5 h-5"></i>
                    </button>
                    <select id="currencySelector" onchange="changeGlobalCurrency()" class="bg-slate-900 border border-white/10 text-white rounded-full px-4 py-2 text-xs font-bold outline-none"></select>
                </div>
            </div>
        </nav>

        <main class="max-w-5xl mx-auto px-6 pt-8 space-y-10">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-2 balance-gradient p-10 rounded-[3rem] text-white relative overflow-hidden flex flex-col justify-between min-h-[320px]">
                    <div class="absolute -right-10 -top-10 w-64 h-64 bg-white/10 rounded-full blur-[80px]"></div>
                    <div class="relative z-10">
                        <p class="text-xs opacity-70 font-bold tracking-widest mb-2 uppercase">Total Balance (<span class="curr-label"></span>)</p>
                        <h2 id="totalBalance" class="text-5xl font-extrabold tracking-tighter">0</h2>
                    </div>
                    <div class="h-24 w-full mt-4 relative z-10">
                        <canvas id="trendChart"></canvas>
                    </div>
                    <button onclick="openModal('modalTransaction')" class="relative z-10 w-fit bg-white text-indigo-600 px-8 py-4 rounded-2xl text-xs font-black shadow-xl hover:scale-105 transition mt-4 uppercase">New Transaction</button>
                </div>
                
                <div class="space-y-4">
                    <div class="premium-card p-6 rounded-[2.5rem]">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[10px] font-bold text-emerald-400 uppercase tracking-widest">Income</span>
                            <select id="reportRangeIncome" onchange="updateUI()" class="bg-transparent text-[9px] text-slate-500 font-bold outline-none border-none">
                                <option value="monthly">MONTHLY</option>
                                <option value="weekly">WEEKLY</option>
                                <option value="yearly">YEARLY</option>
                            </select>
                        </div>
                        <h3 id="incomeDisplay" class="text-2xl font-bold">0</h3>
                    </div>
                    <div class="premium-card p-6 rounded-[2.5rem]">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[10px] font-bold text-rose-400 uppercase tracking-widest">Outflow</span>
                            <select id="reportRangeExpense" onchange="updateUI()" class="bg-transparent text-[9px] text-slate-500 font-bold outline-none border-none">
                                <option value="monthly">MONTHLY</option>
                                <option value="weekly">WEEKLY</option>
                                <option value="yearly">YEARLY</option>
                            </select>
                        </div>
                        <h3 id="expenseDisplay" class="text-2xl font-bold">0</h3>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                <div class="lg:col-span-4 space-y-6">
                    <div class="flex justify-between items-center px-2">
                        <h4 class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Accounts</h4>
                        <button onclick="openModal('modalAccount')" class="text-indigo-400 text-[10px] font-bold">+ ADD ASSET</button>
                    </div>
                    <div id="accountsList" class="space-y-4"></div>
                </div>

                <div class="lg:col-span-8">
                    <button onclick="toggleHistory()" class="w-full flex justify-between items-center px-2 group cursor-pointer">
                        <h4 class="text-[10px] font-black text-slate-500 group-hover:text-indigo-400 transition uppercase tracking-widest">Transaction History</h4>
                        <div class="flex items-center gap-2">
                            <span id="historyStatus" class="text-[9px] font-bold text-slate-600 uppercase">Show</span>
                            <i id="historyChevron" data-lucide="chevron-down" class="w-4 h-4 text-slate-600 rotate-icon"></i>
                        </div>
                    </button>
                    
                    <div id="historyWrapper">
                        <div id="transactionHistory" class="space-y-3"></div>
                        <div class="pt-10 space-y-4">
                            <button onclick="exportToPDF()" class="w-full py-4 rounded-2xl border border-indigo-500/30 bg-indigo-500/5 text-indigo-400 text-[10px] font-black uppercase tracking-[0.2em] hover:bg-indigo-500 hover:text-white transition-all flex items-center justify-center gap-2">
                                <i data-lucide="download" class="w-3 h-3"></i> Export Financial Report (PDF)
                            </button>
                            <button onclick="resetApp()" class="w-full py-4 text-[9px] font-bold text-slate-700 hover:text-rose-500 transition uppercase tracking-[0.4em]">Full Reset Application</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="modalReceipt" class="hidden fixed inset-0 bg-black/95 z-[70] flex items-center justify-center p-6">
        <div class="bg-white text-slate-900 w-full max-w-sm p-10 rounded-[2.5rem] font-mono text-[11px] animate-fade">
            <div class="text-center border-b-2 border-dashed border-slate-200 pb-6 mb-6">
                <h2 class="font-black text-xl italic tracking-tighter">APM TRADE</h2>
                <p class="text-[9px] opacity-60 font-sans" id="receiptDate"></p>
            </div>
            <div id="receiptBody" class="space-y-4 mb-8"></div>
            <div class="flex gap-3 no-print">
                <button onclick="window.print()" class="flex-1 bg-slate-900 text-white py-4 rounded-2xl font-bold">PRINT</button>
                <button onclick="closeModal('modalReceipt')" class="flex-1 bg-slate-100 py-4 rounded-2xl font-bold">CLOSE</button>
            </div>
        </div>
    </div>

    <div id="modalTransaction" class="hidden fixed inset-0 bg-slate-950/90 backdrop-blur-md z-50 flex items-center justify-center p-6">
        <div class="bg-slate-900 border border-white/10 w-full max-w-lg rounded-[3rem] p-8">
            <form id="txForm" class="space-y-6">
                <div class="flex p-1 bg-black/40 rounded-2xl">
                    <button type="button" onclick="setTxType('expense')" id="btnExp" class="flex-1 py-3 rounded-xl text-[10px] font-black bg-slate-800 text-white">EXPENSE</button>
                    <button type="button" onclick="setTxType('income')" id="btnInc" class="flex-1 py-3 rounded-xl text-[10px] font-black opacity-40">INCOME</button>
                    <button type="button" onclick="setTxType('transfer')" id="btnTra" class="flex-1 py-3 rounded-xl text-[10px] font-black opacity-40">TRANSFER</button>
                </div>
                <div class="space-y-4">
                    <select id="txSource" class="w-full input-premium rounded-2xl p-4 text-sm font-bold outline-none"></select>
                    <div id="targetContainer" class="hidden">
                        <select id="txTarget" class="w-full input-premium rounded-2xl p-4 text-sm font-bold outline-none"></select>
                    </div>
                    <select id="txCategory" class="w-full input-premium rounded-2xl p-4 text-sm font-bold outline-none"></select>
                    <div class="text-center">
                        <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2">Amount</p>
                        <input type="text" id="txAmount" inputmode="numeric" class="w-full bg-transparent text-white text-5xl font-black outline-none text-center" placeholder="0" required>
                    </div>
                </div>
                <div class="flex gap-4">
                    <button type="submit" class="flex-[2] balance-gradient text-white font-black py-5 rounded-2xl">CONFIRM</button>
                    <button type="button" onclick="closeModal('modalTransaction')" class="flex-1 bg-slate-800 text-white font-bold py-5 rounded-2xl">CANCEL</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modalAccount" class="hidden fixed inset-0 bg-slate-950/90 backdrop-blur-md z-50 flex items-center justify-center p-6">
        <div class="bg-slate-900 border border-white/10 w-full max-w-sm rounded-[3rem] p-8">
            <h3 class="text-xl font-bold mb-6 text-center">New Asset</h3>
            <div class="space-y-6">
                <input type="text" id="accName" class="w-full input-premium rounded-2xl p-4 outline-none font-bold" placeholder="Account Name">
                <div class="grid grid-cols-4 gap-2">
                    <button onclick="setIcon('wallet')" id="icon-wallet" class="p-4 rounded-xl bg-indigo-500 text-white flex justify-center icon-btn"><i data-lucide="wallet"></i></button>
                    <button onclick="setIcon('credit-card')" id="icon-credit-card" class="p-4 rounded-xl bg-slate-800 text-white/20 flex justify-center icon-btn"><i data-lucide="credit-card"></i></button>
                    <button onclick="setIcon('coins')" id="icon-coins" class="p-4 rounded-xl bg-slate-800 text-white/20 flex justify-center icon-btn"><i data-lucide="coins"></i></button>
                    <button onclick="setIcon('landmark')" id="icon-landmark" class="p-4 rounded-xl bg-slate-800 text-white/20 flex justify-center icon-btn"><i data-lucide="landmark"></i></button>
                </div>
                <input type="color" id="accColor" value="#6366f1" class="w-full h-12 bg-transparent border-none cursor-pointer">
                <button onclick="addAccount()" class="w-full balance-gradient text-white font-black py-4 rounded-2xl">CREATE</button>
                <button onclick="closeModal('modalAccount')" class="w-full text-slate-500 text-xs font-bold py-2">CANCEL</button>
            </div>
        </div>
    </div>

    <script>
        let selectedIcon = 'wallet';
        let currentTxType = 'expense';
        let trendChartInstance = null;
        let isPrivate = JSON.parse(localStorage.getItem('ndi_privacy')) || false;
        let isHistoryVisible = false;
        
        let state = {
            accounts: JSON.parse(localStorage.getItem('ndi_accounts')) || [],
            transactions: JSON.parse(localStorage.getItem('ndi_transactions')) || [],
            settings: JSON.parse(localStorage.getItem('ndi_settings')) || { currency: 'IDR' },
            categories: {
                expense: ['Living', 'Food', 'Bills', 'Shopping', 'Penarikan', 'Others'],
                income: ['Salary', 'Trading Profit', 'Tabungan', 'Bonus']
            }
        };

        const currencies = ["IDR", "USD", "EUR", "BTC", "ETH", "SGD", "JPY", "MYR"].sort();

        document.getElementById('txAmount').addEventListener('input', function(e) {
            let val = this.value.replace(/\D/g, '');
            if (!val) val = "0";
            let n = parseFloat(val) / 100;
            this.value = new Intl.NumberFormat('id-ID', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n);
        });

        function init() {
            document.getElementById('currencySelector').innerHTML = currencies.map(c => `<option value="${c}">${c}</option>`).join('');
            if(state.accounts.length === 0) {
                state.accounts.push({ id: 1, name: 'Main Vault', balances: {}, color: '#6366f1', icon: 'wallet', originCurrency: 'IDR' });
            }
            updatePrivacyIcon();
            updateUI();
        }

        function toggleHistory() {
            isHistoryVisible = !isHistoryVisible;
            const wrapper = document.getElementById('historyWrapper');
            const chevron = document.getElementById('historyChevron');
            const status = document.getElementById('historyStatus');
            
            if (isHistoryVisible) {
                wrapper.classList.add('show');
                chevron.classList.add('active');
                status.innerText = 'Hide';
            } else {
                wrapper.classList.remove('show');
                chevron.classList.remove('active');
                status.innerText = 'Show';
            }
        }

        function save() {
            localStorage.setItem('ndi_accounts', JSON.stringify(state.accounts));
            localStorage.setItem('ndi_transactions', JSON.stringify(state.transactions));
            localStorage.setItem('ndi_settings', JSON.stringify(state.settings));
            localStorage.setItem('ndi_privacy', JSON.stringify(isPrivate));
        }

        function togglePrivacy() {
            isPrivate = !isPrivate;
            save(); updatePrivacyIcon(); updateUI();
        }

        function updatePrivacyIcon() {
            const icon = document.getElementById('privacyIcon');
            icon.setAttribute('data-lucide', isPrivate ? 'eye-off' : 'eye');
            if (window.lucide) lucide.createIcons();
        }

        function formatCurrency(v, c) { 
            if (isPrivate) return "••••••";
            if (c === 'IDR') return new Intl.NumberFormat('id-ID', { minimumFractionDigits: 0 }).format(v);
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: c, minimumFractionDigits: 2 }).format(v).replace(/\s/g, ' ');
        }

        function updateUI() {
            const curr = state.settings.currency;
            document.querySelectorAll('.curr-label').forEach(el => el.innerText = curr);
            document.getElementById('currencySelector').value = curr;
            const filteredAccs = state.accounts.filter(a => a.originCurrency === curr);
            const total = filteredAccs.reduce((sum, acc) => sum + (acc.balances[curr] || 0), 0);
            document.getElementById('totalBalance').innerText = formatCurrency(total, curr);
            document.getElementById('incomeDisplay').innerText = formatCurrency(calculateFilteredSum('income', curr, 'reportRangeIncome'), curr);
            document.getElementById('expenseDisplay').innerText = formatCurrency(calculateFilteredSum('expense', curr, 'reportRangeExpense'), curr);
            renderAccounts(); renderTransactions(); populateSelectors(); renderTrendChart();
            if (window.lucide) lucide.createIcons();
        }

        function calculateFilteredSum(type, curr, rangeId) {
            const range = document.getElementById(rangeId).value;
            const now = new Date();
            return state.transactions.filter(t => t.type === type && t.currency === curr).filter(t => {
                const d = new Date(t.date);
                if(range === 'weekly') { let wa = new Date(); wa.setDate(now.getDate() - 7); return d >= wa; }
                if(range === 'monthly') return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                if(range === 'yearly') return d.getFullYear() === now.getFullYear();
                return true;
            }).reduce((s, t) => s + t.amount, 0);
        }

        function renderAccounts() {
            const curr = state.settings.currency;
            const filtered = state.accounts.filter(a => a.originCurrency === curr);
            document.getElementById('accountsList').innerHTML = filtered.map(acc => {
                const accIn = state.transactions.filter(t => t.sourceId == acc.id && t.type === 'income' && t.currency === curr).reduce((s, t) => s + t.amount, 0);
                const accOut = state.transactions.filter(t => t.sourceId == acc.id && (t.type === 'expense' || t.type === 'transfer') && t.currency === curr).reduce((s, t) => s + t.amount, 0);
                const bal = acc.balances[curr] || 0;
                const pct = accIn > 0 ? Math.max(0, Math.min(100, (bal / accIn) * 100)) : 0;
                return `
                    <div class="group premium-card p-6 rounded-[2.5rem] flex flex-col gap-4 border-l-4" style="border-left-color: ${acc.color}">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3">
                                <div class="p-2 rounded-lg" style="background: ${acc.color}20; color: ${acc.color}"><i data-lucide="${acc.icon || 'wallet'}" class="w-4 h-4"></i></div>
                                <div><h5 class="font-bold text-xs text-slate-200">${acc.name}</h5>
                                <button onclick="deleteAccount(${acc.id})" class="text-[8px] text-rose-500 opacity-0 group-hover:opacity-100 transition-all font-black uppercase">Delete</button></div>
                            </div>
                            <p class="font-bold text-sm text-white">${formatCurrency(bal, curr)}</p>
                        </div>
                        <div class="space-y-1.5">
                            <div class="flex justify-between items-center text-[8px] font-black uppercase opacity-40"><span>Retention</span><span>${pct.toFixed(1)}%</span></div>
                            <div class="w-full h-1 bg-white/5 rounded-full overflow-hidden"><div class="h-full transition-all duration-1000" style="width: ${pct}%; background: ${acc.color}"></div></div>
                        </div>
                        <div class="flex justify-between items-center pt-2 border-t border-white/5">
                            <div class="flex flex-col">
                                <span class="text-[8px] font-black text-emerald-500/60 uppercase tracking-tighter">pemasukan</span>
                                <span class="text-[10px] font-bold text-emerald-400">${isPrivate ? '••••' : '+' + formatCurrency(accIn, curr)}</span>
                            </div>
                            <div class="flex flex-col text-right">
                                <span class="text-[8px] font-black text-rose-500/60 uppercase tracking-tighter">pengeluaran</span>
                                <span class="text-[10px] font-bold text-rose-400">${isPrivate ? '••••' : '-' + formatCurrency(accOut, curr)}</span>
                            </div>
                        </div>
                    </div>`;
            }).join('');
            if (window.lucide) lucide.createIcons();
        }

        function renderTransactions() {
            const curr = state.settings.currency;
            const filtered = state.transactions.filter(t => t.currency === curr).reverse().slice(0, 20);
            document.getElementById('transactionHistory').innerHTML = filtered.map(t => `
                <div class="group premium-card p-4 rounded-[1.8rem] flex items-center justify-between animate-fade">
                    <div class="flex items-center gap-4 flex-1 cursor-pointer" onclick="openReceipt('${t.id}')">
                        <div class="p-2 rounded-xl ${t.type === 'income' ? 'bg-emerald-500/10 text-emerald-400' : 'bg-rose-500/10 text-rose-400'}"><i data-lucide="${t.type === 'income' ? 'arrow-down' : 'arrow-up'}" class="w-4 h-4"></i></div>
                        <div><h5 class="font-bold text-xs">${t.category}</h5><p class="text-[8px] text-slate-500 font-bold uppercase">${t.sourceName} • ${new Date(t.date).toLocaleDateString()}</p></div>
                    </div>
                    <div class="flex items-center gap-4">
                        <p class="font-black text-xs ${t.type === 'income' ? 'text-emerald-400' : 'text-rose-400'}">${t.type === 'expense' ? '-' : '+'}${formatCurrency(t.amount, t.currency)}</p>
                        <button onclick="deleteTransaction('${t.id}')" class="p-2 text-rose-500/20 hover:text-rose-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                </div>`).join('');
            if (window.lucide) lucide.createIcons();
        }

        function renderTrendChart() {
            const ctx = document.getElementById('trendChart').getContext('2d');
            const curr = state.settings.currency;
            const labels = []; const data = [];
            for (let i = 6; i >= 0; i--) {
                const d = new Date(); d.setDate(d.getDate() - i); labels.push(d.toLocaleDateString('id-ID', { weekday: 'short' }));
                const ds = d.toISOString().split('T')[0];
                const b = state.transactions.filter(t => t.currency === curr && t.date.split('T')[0] <= ds).reduce((s, t) => t.type === 'income' ? s + t.amount : s - t.amount, 0);
                data.push(b);
            }
            if (trendChartInstance) trendChartInstance.destroy();
            trendChartInstance = new Chart(ctx, {
                type: 'line', data: { labels, datasets: [{ data, borderColor: 'rgba(255,255,255,0.8)', borderWidth: 2, pointRadius: 0, tension: 0.4, fill: true, backgroundColor: (c) => { const g = c.chart.ctx.createLinearGradient(0,0,0,100); g.addColorStop(0, 'rgba(255,255,255,0.1)'); g.addColorStop(1, 'rgba(255,255,255,0)'); return g; } }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: true, grid: { display: false }, ticks: { color: 'rgba(255,255,255,0.3)', font: { size: 8 } } }, y: { display: false } } }
            });
        }

        function exportToPDF() {
            const curr = state.settings.currency; const element = document.createElement('div');
            element.innerHTML = `<div style="padding:40px; font-family:sans-serif; color:#1e293b;"><h1 style="text-align:center;">APM TRADE REPORT</h1><p style="text-align:center; font-size:10px; color:#64748b;">Generated: ${new Date().toLocaleString()}</p><div style="margin:30px 0; padding:20px; background:#f8fafc; border-radius:15px;"><p style="font-size:10px; color:#64748b; margin:0;">TOTAL BALANCE</p><h2 style="font-size:32px; margin:5px 0;">${formatCurrency(state.accounts.reduce((s, a) => s + (a.balances[curr] || 0), 0), curr)}</h2></div><h3>ASSET SUMMARY</h3><table style="width:100%; border-collapse:collapse; margin-bottom:30px;">${state.accounts.filter(a => a.originCurrency === curr).map(acc => `<tr><td style="padding:10px 0; border-bottom:1px solid #eee;">${acc.name}</td><td style="text-align:right; font-weight:bold;">${formatCurrency(acc.balances[curr] || 0, curr)}</td></tr>`).join('')}</table><h3>TRANSACTIONS</h3><table style="width:100%; border-collapse:collapse; font-size:10px;">${state.transactions.filter(t => t.currency === curr).reverse().slice(0, 30).map(t => `<tr><td style="padding:8px 0; border-bottom:1px solid #f8fafc;">${new Date(t.date).toLocaleDateString()}</td><td>${t.category}</td><td style="text-align:right; font-weight:bold; color:${t.type==='income'?'#10b981':'#f43f5e'};">${t.type==='expense'?'-':'+'}${formatCurrency(t.amount, t.currency)}</td></tr>`).join('')}</table></div>`;
            html2pdf().set({ margin: 10, filename: `APM-Report-${curr}.pdf`, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }).from(element).save();
        }

        document.getElementById('txForm').onsubmit = (e) => {
            e.preventDefault(); const raw = document.getElementById('txAmount').value.replace(/\D/g, ''); const amount = parseFloat(raw) / 100; if (amount <= 0) return;
            const sourceId = document.getElementById('txSource').value; const source = state.accounts.find(a => a.id == sourceId); const curr = state.settings.currency;
            let tx = { id: Date.now().toString(), type: currentTxType, sourceId, sourceName: source.name, amount, currency: curr, date: new Date().toISOString(), category: document.getElementById('txCategory').value };
            if(currentTxType === 'expense') source.balances[curr] = (source.balances[curr] || 0) - amount;
            else if(currentTxType === 'income') source.balances[curr] = (source.balances[curr] || 0) + amount;
            else if(currentTxType === 'transfer') { const targetId = document.getElementById('txTarget').value; const target = state.accounts.find(a => a.id == targetId); source.balances[curr] = (source.balances[curr] || 0) - amount; target.balances[curr] = (target.balances[curr] || 0) + amount; tx.targetId = targetId; tx.category = `To ${target.name}`; }
            state.transactions.push(tx); save(); updateUI(); closeModal('modalTransaction'); document.getElementById('txAmount').value = '';
        };

        function deleteTransaction(id) { if(!confirm("Hapus?")) return; const idx = state.transactions.findIndex(t => t.id === id); const tx = state.transactions[idx]; const s = state.accounts.find(a => a.id == tx.sourceId); if(s) { if(tx.type === 'expense') s.balances[tx.currency] += tx.amount; else if(tx.type === 'income') s.balances[tx.currency] -= tx.amount; else if(tx.type === 'transfer') { s.balances[tx.currency] += tx.amount; const t = state.accounts.find(a => a.id == tx.targetId); if(t) t.balances[tx.currency] -= tx.amount; } } state.transactions.splice(idx, 1); save(); updateUI(); }
        function deleteAccount(id) { if(confirm("Hapus aset?")) { state.accounts = state.accounts.filter(a => a.id != id); save(); updateUI(); } }
        function addAccount() { const n = document.getElementById('accName').value; if(!n) return; state.accounts.push({ id: Date.now(), name: n, balances: {}, color: document.getElementById('accColor').value, icon: selectedIcon, originCurrency: state.settings.currency }); save(); updateUI(); closeModal('modalAccount'); document.getElementById('accName').value = ''; }
        function openReceipt(id) { const t = state.transactions.find(x => x.id === id); document.getElementById('receiptDate').innerText = new Date(t.date).toLocaleString(); document.getElementById('receiptBody').innerHTML = `<div class="flex justify-between"><span>TYPE</span> <b>${t.type.toUpperCase()}</b></div><div class="flex justify-between"><span>CATEGORY</span> <b>${t.category}</b></div><div class="flex justify-between"><span>SOURCE</span> <b>${t.sourceName}</b></div><div class="flex justify-between border-t border-slate-200 pt-4 mt-4 font-black text-lg"><span>TOTAL</span> <span>${formatCurrency(t.amount, t.currency)}</span></div>`; openModal('modalReceipt'); }
        function setIcon(i) { selectedIcon = i; document.querySelectorAll('.icon-btn').forEach(b => b.classList.replace('bg-indigo-500', 'bg-slate-800')); document.getElementById(`icon-${i}`).classList.replace('bg-slate-800', 'bg-indigo-500'); }
        function setTxType(t) { currentTxType = t; ['btnExp', 'btnInc', 'btnTra'].forEach(id => { document.getElementById(id).classList.add('opacity-40'); document.getElementById(id).classList.remove('bg-slate-800', 'text-white'); }); const aid = t === 'expense' ? 'btnExp' : t === 'income' ? 'btnInc' : 'btnTra'; document.getElementById(aid).classList.remove('opacity-40'); document.getElementById(aid).classList.add('bg-slate-800', 'text-white'); document.getElementById('targetContainer').classList.toggle('hidden', t !== 'transfer'); populateSelectors(); }
        function populateSelectors() { const f = state.accounts.filter(a => a.originCurrency === state.settings.currency); const opts = f.map(a => `<option value="${a.id}">${a.name}</option>`).join(''); document.getElementById('txSource').innerHTML = opts; document.getElementById('txTarget').innerHTML = opts; const cats = currentTxType === 'income' ? state.categories.income : state.categories.expense; document.getElementById('txCategory').innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join(''); }
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function changeGlobalCurrency() { state.settings.currency = document.getElementById('currencySelector').value; save(); updateUI(); }
        function resetApp() { if(confirm("ERASE ALL?")) { localStorage.clear(); location.reload(); } }
        window.onload = init;
    </script>
</body>
</html>
